<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <!-- Prevents browser zoom/scaling on mobile — essential for correct camera fill -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!-- iOS fullscreen camera support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>KAU Esports - Tournament AR</title>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      /* Prevent pinch-zoom and scroll gestures from fighting the camera */
      touch-action: none;
    }

    /* ── Loading screen ─────────────────────────────────────────────────── */
    #ar-loading {
      position: fixed;
      inset: 0;
      background: #020D02;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 9999;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #ar-loading h1 {
      color: #00E676;
      font-size: clamp(1.1rem, 5.5vw, 1.8rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-align: center;
      padding: 0 24px;
    }

    #ar-loading p {
      color: #A5D6A7;
      font-size: clamp(0.8rem, 3.8vw, 1rem);
      text-align: center;
    }

    .ar-spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #0A260A;
      border-top-color: #00E676;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #ar-loading.hidden { display: none; }

    /* ── Hint banner shown until marker is first found ──────────────────── */
    #ar-hint {
      position: fixed;
      bottom: max(20px, env(safe-area-inset-bottom, 20px));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.80);
      color: #00E676;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: clamp(0.75rem, 3.5vw, 0.9rem);
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 999px;
      border: 1.5px solid #00E676;
      white-space: nowrap;
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #ar-hint.hidden { opacity: 0; }

    /* Keep the canvas exactly full-screen on every device */
    a-scene, canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCqbp0pJAyTi9SfSS6Ah8DYNucWhfRs5-o",
      authDomain: "kauesports-83131.firebaseapp.com",
      projectId: "kauesports-83131",
      storageBucket: "kauesports-83131.firebasestorage.app",
      messagingSenderId: "1021860460145",
      appId: "1:1021860460145:web:1d24517d2ab254e443cdd0"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ── Mobile detection ─────────────────────────────────────────────────────
    // Used to disable float animations (cards bob while you try to read them)
    // and to suppress the title pulse animation.
    const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
                  || window.innerWidth < 768;

    // ── Helpers ──────────────────────────────────────────────────────────────
    function formatDate(dateStr) {
      if (!dateStr) return "TBD";
      const d = new Date(dateStr);
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    function truncate(str, max) {
      if (!str || str === "null") return "—";
      return str.length > max ? str.substring(0, max - 1) + "…" : str;
    }

    // Creates a fully-opaque a-plane (no semi-transparent layers = no flicker)
    function makePlane(w, h, color, pos, cls) {
      const p = document.createElement("a-plane");
      p.setAttribute("width",    w);
      p.setAttribute("height",   h);
      p.setAttribute("color",    color);
      p.setAttribute("position", pos);
      p.setAttribute("opacity",  "1");
      if (cls) p.classList.add(cls);
      return p;
    }

    function makeText(value, pos, color, width, font) {
      const t = document.createElement("a-text");
      t.setAttribute("value",    value);
      t.setAttribute("position", pos);
      t.setAttribute("align",    "center");
      t.setAttribute("color",    color);
      t.setAttribute("width",    width);
      t.setAttribute("font",     font);
      return t;
    }

    // ── Card builder ─────────────────────────────────────────────────────────
    function buildCards(tournaments) {
      const marker = document.querySelector("a-marker");
      if (!marker) return;

      marker.querySelectorAll(".tournament-card, .ar-header, .ar-bg").forEach(el => el.remove());

      const count      = tournaments.length;
      const spacing    = 1.6;
      const totalWidth = (count - 1) * spacing;
      const bgW        = count * spacing + 1.0;
      const bgH        = 3.4;
      const bgY        = 1.5;
      const bdr        = 0.06;

      // ── Background panel: one solid green border rect + one dark fill ────
      marker.appendChild(makePlane(bgW + bdr*2, bgH + bdr*2, "#00E676", `0 ${bgY} -0.04`, "ar-bg"));
      marker.appendChild(makePlane(bgW,         bgH,         "#030F03", `0 ${bgY} -0.03`, "ar-bg"));

      // ── Header banner ────────────────────────────────────────────────────
      const bannerW = Math.max(bgW, 5.8);
      const bannerY = bgY + bgH / 2 + 0.35;
      marker.appendChild(makePlane(bannerW + bdr*2, 0.62, "#00E676", `0 ${bannerY} -0.04`, "ar-header"));
      marker.appendChild(makePlane(bannerW,          0.50, "#000000", `0 ${bannerY} -0.03`, "ar-header"));

      const header = makeText("KAU ESPORTS TOURNAMENTS", `0 ${bannerY} -0.02`, "#00E676", "7.5", "exo2bold");
      header.classList.add("ar-header");
      // Pulse animation is distracting on mobile — only run it on desktop
      if (!isMobile) {
        header.setAttribute("animation", "property: scale; from: 1 1 1; to: 1.03 1.03 1.03; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine");
      }
      marker.appendChild(header);

      // ── Status colour palette ────────────────────────────────────────────
      const statusColors = {
        upcoming:  "#00C853",
        ongoing:   "#69F0AE",
        active:    "#00E676",
        completed: "#546E7A",
        cancelled: "#EF5350"
      };

      // ── Individual cards ─────────────────────────────────────────────────
      tournaments.forEach((t, i) => {
        const x      = -totalWidth / 2 + i * spacing;
        const g      = document.createElement("a-entity");
        g.classList.add("tournament-card");
        g.setAttribute("position", `${x} 0.05 0`);

        const status      = (t.status || "upcoming").toLowerCase();
        const statusColor = statusColors[status] || "#00C853";
        const cardW = 1.4, cardH = 2.0, cardY = 1.1;

        // Card: green border rect behind, dark fill in front
        g.appendChild(makePlane(cardW + 0.04, cardH + 0.04, "#00E676", `0 ${cardY} -0.01`));
        g.appendChild(makePlane(cardW,        cardH,         "#030F03", `0 ${cardY}  0`));

        // Top accent strip
        g.appendChild(makePlane(cardW, 0.09, "#00E676", `0 ${cardY + cardH/2 - 0.045} 0.001`));

        // Game name (large, bold, white)
        g.appendChild(makeText(truncate(t.game || "Game", 14),
          `0 ${cardY + 0.78} 0.01`, "#FFFFFF", "2.8", "exo2bold"));

        // Tournament name (green)
        g.appendChild(makeText(truncate(t.name || "Tournament", 20),
          `0 ${cardY + 0.58} 0.01`, "#00E676", "2.4", "exo2semibold"));

        // Divider
        g.appendChild(makePlane(1.2, 0.012, "#00E676", `0 ${cardY + 0.45} 0.001`));

        // Info rows
        [
          [`Format: ${truncate(t.format || "—", 20)}`, cardY + 0.32, "#A5D6A7"],
          [`Start: ${formatDate(t.startDate)}`,         cardY + 0.16, "#E8F5E9"],
          [`End:   ${formatDate(t.endDate)}`,           cardY + 0.00, "#E8F5E9"],
          [`Players: ${t.registeredPlayers || 0} / ${t.maxPlayers || "?"}`, cardY - 0.16, "#E8F5E9"]
        ].forEach(([val, y, color]) => {
          g.appendChild(makeText(val, `0 ${y} 0.01`, color, "2.2", "roboto"));
        });

        // Progress bar
        g.appendChild(makePlane(1.1, 0.07, "#0A260A", `0 ${cardY - 0.30} 0.001`));
        const maxP  = t.maxPlayers || 1;
        const regP  = t.registeredPlayers || 0;
        const ratio = Math.min(regP / maxP, 1);
        const fw    = 1.1 * ratio;
        if (fw > 0) {
          const fx = -1.1 / 2 + fw / 2;
          g.appendChild(makePlane(fw, 0.07, "#00E676", `${fx} ${cardY - 0.30} 0.002`));
        }

        // Status badge
        g.appendChild(makePlane(0.7, 0.20, statusColor, `0 ${cardY - 0.50} 0.001`));
        g.appendChild(makeText(status.toUpperCase(),
          `0 ${cardY - 0.50} 0.012`, "#000000", "1.6", "exo2bold"));

        // Float animation: DISABLED on mobile so cards stay still while reading.
        // On desktop, keep a gentle 6 cm bob at a slow easing.
        if (!isMobile) {
          g.setAttribute("animation",
            `property: position; from: ${x} 0.05 0; to: ${x} 0.11 0; ` +
            `dir: alternate; loop: true; dur: ${2400 + i * 350}; easing: easeInOutSine`);
        }

        marker.appendChild(g);
      });
    }

    // ── Firebase fetch ────────────────────────────────────────────────────────
    async function loadTournaments() {
      try {
        const snap = await getDocs(collection(db, "tournaments"));
        const tournaments = [];
        snap.forEach(doc => tournaments.push({ id: doc.id, ...doc.data() }));

        const order = { ongoing: 0, active: 0, upcoming: 1, completed: 2, cancelled: 3 };
        tournaments.sort((a, b) => {
          const ao = order[(a.status || "upcoming").toLowerCase()] ?? 9;
          const bo = order[(b.status || "upcoming").toLowerCase()] ?? 9;
          return ao - bo;
        });

        buildCards(tournaments);
      } catch (err) {
        console.error("Firebase error:", err);
      }
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", () => {
      const scene   = document.querySelector("a-scene");
      const loading = document.getElementById("ar-loading");
      const hint    = document.getElementById("ar-hint");

      scene.addEventListener("loaded", () => {
        // Hide the loading screen once AR.js is ready
        loading.classList.add("hidden");

        loadTournaments();

        // Sticky marker: once Hiro is seen, override the visible setter so
        // AR.js can never hide the content again (no RAF fight = no flicker).
        const marker = document.querySelector("a-marker");

        marker.addEventListener("markerFound", () => {
          // Dismiss the hint as soon as the marker is detected
          hint.classList.add("hidden");

          Object.defineProperty(marker.object3D, "visible", {
            get: () => true,
            set: () => {},       // swallow every hide attempt from AR.js
            configurable: true
          });
        }, { once: true });
      });
    });
  </script>
</head>

<body>
  <!-- Shown while AR.js initialises (can take 3-5 s on mobile) -->
  <div id="ar-loading">
    <div class="ar-spinner"></div>
    <h1>KAU ESPORTS AR</h1>
    <p>Starting camera…</p>
  </div>

  <!-- Dismissed as soon as the Hiro marker is first detected -->
  <div id="ar-hint">Point camera at the Hiro marker</div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    vr-mode-ui="enabled: false"
  >
    <a-marker preset="hiro" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="2">
      <!-- Tournament cards injected by JavaScript -->
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
</body>

</html>
