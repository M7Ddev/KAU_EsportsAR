<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <!-- Stops mobile browsers from zooming — keeps camera feed full-screen -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>KAU Esports - Tournament AR</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* Do NOT set touch-action here — it fights AR.js camera rendering on iOS */
    }

    /* Hint shown until the Hiro marker is detected for the first time */
    #ar-hint {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.78);
      color: #00E676;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: clamp(0.75rem, 3.8vw, 0.95rem);
      font-weight: 600;
      padding: 11px 24px;
      border-radius: 999px;
      border: 1.5px solid #00E676;
      white-space: nowrap;
      z-index: 9999;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #ar-hint.hidden { opacity: 0; }
  </style>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCqbp0pJAyTi9SfSS6Ah8DYNucWhfRs5-o",
      authDomain: "kauesports-83131.firebaseapp.com",
      projectId: "kauesports-83131",
      storageBucket: "kauesports-83131.firebasestorage.app",
      messagingSenderId: "1021860460145",
      appId: "1:1021860460145:web:1d24517d2ab254e443cdd0"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // True on any phone/tablet — used to disable animations for readability
    const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
                  || window.innerWidth < 768;

    // ── Helpers ───────────────────────────────────────────────────────────────
    function formatDate(dateStr) {
      if (!dateStr) return "TBD";
      return new Date(dateStr).toLocaleDateString("en-US",
        { month: "short", day: "numeric", year: "numeric" });
    }

    function truncate(str, max) {
      if (!str || str === "null") return "—";
      return str.length > max ? str.substring(0, max - 1) + "…" : str;
    }

    // Fully-opaque plane — no alpha layers so no z-fighting flicker
    function makePlane(w, h, color, pos, cls) {
      const p = document.createElement("a-plane");
      p.setAttribute("width",    w);
      p.setAttribute("height",   h);
      p.setAttribute("color",    color);
      p.setAttribute("position", pos);
      p.setAttribute("opacity",  "1");
      if (cls) p.classList.add(cls);
      return p;
    }

    function makeText(value, pos, color, width, font) {
      const t = document.createElement("a-text");
      t.setAttribute("value",    value);
      t.setAttribute("position", pos);
      t.setAttribute("align",    "center");
      t.setAttribute("color",    color);
      t.setAttribute("width",    width);
      t.setAttribute("font",     font);
      return t;
    }

    // ── Card builder ──────────────────────────────────────────────────────────
    function buildCards(tournaments) {
      const marker = document.querySelector("a-marker");
      if (!marker) return;

      marker.querySelectorAll(".tournament-card, .ar-header, .ar-bg").forEach(el => el.remove());

      const count   = tournaments.length;
      const spacing = 1.6;
      const totalW  = (count - 1) * spacing;
      const bgW     = count * spacing + 1.0;
      const bgH     = 3.4;
      const bgY     = 1.5;
      const bdr     = 0.06;

      // ── Background panel: solid green border + dark fill ─────────────────
      marker.appendChild(makePlane(bgW + bdr*2, bgH + bdr*2, "#00E676", `0 ${bgY} -0.04`, "ar-bg"));
      marker.appendChild(makePlane(bgW,         bgH,         "#030F03", `0 ${bgY} -0.03`, "ar-bg"));

      // ── Header banner ─────────────────────────────────────────────────────
      const bannerW = Math.max(bgW, 5.8);
      const bannerY = bgY + bgH / 2 + 0.35;
      marker.appendChild(makePlane(bannerW + bdr*2, 0.62, "#00E676", `0 ${bannerY} -0.04`, "ar-header"));
      marker.appendChild(makePlane(bannerW,          0.50, "#000000", `0 ${bannerY} -0.03`, "ar-header"));

      const header = makeText("KAU ESPORTS TOURNAMENTS", `0 ${bannerY} -0.02`, "#00E676", "7.5", "exo2bold");
      header.classList.add("ar-header");
      // Pulse animation: off on mobile (visual noise while reading on a phone)
      if (!isMobile) {
        header.setAttribute("animation",
          "property: scale; from: 1 1 1; to: 1.03 1.03 1.03; " +
          "dir: alternate; loop: true; dur: 2000; easing: easeInOutSine");
      }
      marker.appendChild(header);

      // ── Status colours ────────────────────────────────────────────────────
      const statusColors = {
        upcoming:  "#00C853",
        ongoing:   "#69F0AE",
        active:    "#00E676",
        completed: "#546E7A",
        cancelled: "#EF5350"
      };

      // ── Cards ─────────────────────────────────────────────────────────────
      tournaments.forEach((t, i) => {
        const x      = -totalW / 2 + i * spacing;
        const g      = document.createElement("a-entity");
        g.classList.add("tournament-card");
        // Cards start at y=0.05 — no float offset so they sit flat and still
        g.setAttribute("position", `${x} 0.05 0`);

        const status      = (t.status || "upcoming").toLowerCase();
        const statusColor = statusColors[status] || "#00C853";
        const cardW = 1.4, cardH = 2.0, cardY = 1.1;

        // Green border rect then dark fill
        g.appendChild(makePlane(cardW + 0.04, cardH + 0.04, "#00E676", `0 ${cardY} -0.01`));
        g.appendChild(makePlane(cardW,        cardH,         "#030F03", `0 ${cardY}  0`));

        // Top accent strip
        g.appendChild(makePlane(cardW, 0.09, "#00E676",
          `0 ${cardY + cardH/2 - 0.045} 0.001`));

        // Game name
        g.appendChild(makeText(
          truncate(t.game || "Game", 14),
          `0 ${cardY + 0.78} 0.01`, "#FFFFFF", "2.8", "exo2bold"));

        // Tournament name
        g.appendChild(makeText(
          truncate(t.name || "Tournament", 20),
          `0 ${cardY + 0.58} 0.01`, "#00E676", "2.4", "exo2semibold"));

        // Divider
        g.appendChild(makePlane(1.2, 0.012, "#00E676", `0 ${cardY + 0.45} 0.001`));

        // Info rows
        [
          [`Format: ${truncate(t.format || "—", 20)}`, cardY + 0.32, "#A5D6A7"],
          [`Start: ${formatDate(t.startDate)}`,         cardY + 0.16, "#E8F5E9"],
          [`End:   ${formatDate(t.endDate)}`,           cardY + 0.00, "#E8F5E9"],
          [`Players: ${t.registeredPlayers || 0} / ${t.maxPlayers || "?"}`,
                                                        cardY - 0.16, "#E8F5E9"]
        ].forEach(([val, y, color]) => {
          g.appendChild(makeText(val, `0 ${y} 0.01`, color, "2.2", "roboto"));
        });

        // Progress bar
        g.appendChild(makePlane(1.1, 0.07, "#0A260A", `0 ${cardY - 0.30} 0.001`));
        const ratio = Math.min((t.registeredPlayers || 0) / (t.maxPlayers || 1), 1);
        const fw    = 1.1 * ratio;
        if (fw > 0) {
          g.appendChild(makePlane(fw, 0.07, "#00E676",
            `${-1.1/2 + fw/2} ${cardY - 0.30} 0.002`));
        }

        // Status badge
        g.appendChild(makePlane(0.7, 0.20, statusColor, `0 ${cardY - 0.50} 0.001`));
        g.appendChild(makeText(status.toUpperCase(),
          `0 ${cardY - 0.50} 0.012`, "#000000", "1.6", "exo2bold"));

        // Float animation:
        //   • Mobile → completely OFF so cards stay still while reading
        //   • Desktop → very gentle (±3 cm), slow easing
        if (!isMobile) {
          g.setAttribute("animation",
            `property: position; from: ${x} 0.05 0; to: ${x} 0.08 0; ` +
            `dir: alternate; loop: true; dur: ${2400 + i * 350}; easing: easeInOutSine`);
        }

        marker.appendChild(g);
      });
    }

    // ── Firebase fetch ────────────────────────────────────────────────────────
    async function loadTournaments() {
      try {
        const snap = await getDocs(collection(db, "tournaments"));
        const rows = [];
        snap.forEach(doc => rows.push({ id: doc.id, ...doc.data() }));

        const order = { ongoing: 0, active: 0, upcoming: 1, completed: 2, cancelled: 3 };
        rows.sort((a, b) =>
          (order[(a.status || "upcoming").toLowerCase()] ?? 9) -
          (order[(b.status || "upcoming").toLowerCase()] ?? 9));

        buildCards(rows);
      } catch (err) {
        console.error("Firebase error:", err);
      }
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", () => {
      const scene  = document.querySelector("a-scene");
      const hint   = document.getElementById("ar-hint");

      scene.addEventListener("loaded", () => {
        loadTournaments();

        // Sticky marker — once Hiro is detected, permanently lock visibility.
        // Object.defineProperty means AR.js can never set visible=false again,
        // so no RAF fight and no per-frame flicker.
        const marker = document.querySelector("a-marker");
        marker.addEventListener("markerFound", () => {
          hint.classList.add("hidden");
          Object.defineProperty(marker.object3D, "visible", {
            get: () => true,
            set: () => {},
            configurable: true
          });
        }, { once: true });
      });
    });
  </script>
</head>

<!-- Let AR.js manage the body — no conflicting styles on the body tag -->
<body style="margin:0; overflow:hidden;">

  <!-- Dismissed automatically when marker is first found -->
  <div id="ar-hint">Point camera at the Hiro marker</div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
  >
    <a-marker preset="hiro" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="2">
      <!-- Tournament cards injected by JavaScript -->
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
