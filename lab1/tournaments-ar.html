<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>KAU Esports - Tournament AR</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: transparent;
    }

    /* ── Menu screen ──────────────────────────────────────────────────── */
    #menu-screen {
      position: fixed; inset: 0;
      background: #080f08;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000;
      gap: 36px;
      padding: 24px;
    }

    .menu-title {
      color: #fff;
      font-size: clamp(1.3rem, 6vw, 2rem);
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.02em;
    }
    .menu-title span { color: #00E676; }

    .menu-subtitle {
      color: #6a8a6a;
      font-size: clamp(0.85rem, 3.5vw, 1rem);
      text-align: center;
      margin-top: -20px;
    }

    .menu-cards {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 420px;
    }

    .menu-card {
      flex: 1;
      background: #0d1a0d;
      border: 2px solid #00E676;
      border-radius: 20px;
      padding: 32px 12px;
      display: flex; flex-direction: column;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.2s, transform 0.1s;
    }
    .menu-card:active { background: #183018; transform: scale(0.96); }

    .menu-card .icon { font-size: 2.6rem; }
    .menu-card .label {
      color: #00E676;
      font-size: clamp(0.9rem, 4vw, 1.05rem);
      font-weight: 700;
      text-align: center;
    }

    /* ── No leaderboard screen ────────────────────────────────────────── */
    #no-lb-screen {
      position: fixed; inset: 0;
      background: #080f08;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000;
      gap: 28px;
      padding: 24px;
      text-align: center;
    }

    #no-lb-screen .big-icon { font-size: 4rem; }

    #no-lb-screen .msg {
      color: #fff;
      font-size: clamp(1rem, 5vw, 1.3rem);
      line-height: 1.6;
    }
    #no-lb-screen .msg span { color: #00E676; font-weight: 700; }

    #back-btn {
      background: transparent;
      border: 2px solid #00E676;
      color: #00E676;
      border-radius: 999px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── AR hint ──────────────────────────────────────────────────────── */
    #ar-hint {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.80);
      color: #00E676;
      font-size: clamp(0.75rem, 3.8vw, 0.95rem);
      font-weight: 600;
      padding: 11px 24px;
      border-radius: 999px;
      border: 1.5px solid #00E676;
      white-space: nowrap;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #ar-hint.visible { opacity: 1; }
    #ar-hint.hidden  { opacity: 0; }
  </style>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCqbp0pJAyTi9SfSS6Ah8DYNucWhfRs5-o",
      authDomain: "kauesports-83131.firebaseapp.com",
      projectId: "kauesports-83131",
      storageBucket: "kauesports-83131.firebasestorage.app",
      messagingSenderId: "1021860460145",
      appId: "1:1021860460145:web:1d24517d2ab254e443cdd0"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ── Helpers ───────────────────────────────────────────────────────────────
    function formatDate(d) {
      if (!d) return 'TBD';
      return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function trunc(s, max) {
      if (!s || s === 'null') return '—';
      return s.length > max ? s.slice(0, max - 1) + '…' : s;
    }

    // ── Canvas card drawing ───────────────────────────────────────────────────
    // 512×256: power-of-two dimensions for best GPU texture compatibility
    const CW = 512, CH = 256;

    function rrect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y,     x + w, y + r,     r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x,      y + h, x,        y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x,      y,     x + r,    y,         r);
      ctx.closePath();
    }

    const STATUS_COLORS = {
      upcoming:  '#00C853',
      ongoing:   '#69F0AE',
      active:    '#00E676',
      completed: '#546E7A',
      cancelled: '#EF5350'
    };

    function drawCard(canvas, t) {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, CW, CH);

      const status = (t.status || 'upcoming').toLowerCase();
      const sc = STATUS_COLORS[status] || '#00C853';

      // Dark background with rounded corners
      rrect(ctx, 0, 0, CW, CH, 24);
      ctx.fillStyle = '#0D1B0D';
      ctx.fill();

      // Green border
      rrect(ctx, 2, 2, CW - 4, CH - 4, 22);
      ctx.strokeStyle = '#00E676';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Left accent bar (clipped to card shape)
      ctx.save();
      rrect(ctx, 0, 0, CW, CH, 24);
      ctx.clip();
      ctx.fillStyle = '#00E676';
      ctx.fillRect(0, 0, 8, CH);
      ctx.restore();

      // Status pill (top-right)
      const pw = 120, ph = 30, px = CW - pw - 14, py = 14;
      rrect(ctx, px, py, pw, ph, 15);
      ctx.fillStyle = sc;
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.font = 'bold 14px "Segoe UI",sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(status.toUpperCase(), px + pw / 2, py + ph / 2);

      const lx = 20;

      // Game name
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px "Segoe UI",sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(trunc(t.game || 'Game', 22), lx, 16);

      // Tournament name
      ctx.fillStyle = '#00E676';
      ctx.font = 'bold 17px "Segoe UI",sans-serif';
      ctx.fillText(trunc(t.name || 'Tournament', 34), lx, 48);

      // Divider
      ctx.fillStyle = '#1e3a1e';
      ctx.fillRect(lx, 78, CW - lx - 14, 1);

      // Info rows
      const rows = [
        ['Format',  trunc(t.format || '—', 22)],
        ['Start',   formatDate(t.startDate)],
        ['End',     formatDate(t.endDate)],
        ['Players', `${t.registeredPlayers || 0} / ${t.maxPlayers || '?'}`]
      ];
      ctx.font = '14px "Segoe UI",sans-serif';
      rows.forEach(([lbl, val], i) => {
        const ry = 88 + i * 28;
        ctx.fillStyle = '#69F0AE';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(lbl + ':', lx, ry);
        ctx.fillStyle = '#E8F5E9';
        ctx.fillText(val, lx + 84, ry);
      });

      // Progress bar
      const ratio = Math.min((t.registeredPlayers || 0) / (t.maxPlayers || 1), 1);
      const bx = lx, by = CH - 22, bw = CW - lx - 14, bh = 10;
      rrect(ctx, bx, by, bw, bh, 5);
      ctx.fillStyle = '#0a260a';
      ctx.fill();
      if (ratio > 0) {
        rrect(ctx, bx, by, Math.max(bw * ratio, bh), bh, 5);
        ctx.fillStyle = sc;
        ctx.fill();
      }
    }

    // ── Build AR cards (horizontal, stacked vertically) ───────────────────────
    function buildCards(tournaments) {
      const marker = document.querySelector('a-marker');
      if (!marker) return;

      marker.querySelectorAll('.t-card, .t-header').forEach(el => el.remove());

      const count = tournaments.length;
      if (count === 0) return;

      // Horizontal card: 2.0 wide × 1.0 tall (matches 512×256 canvas ratio)
      const cW = 2.0, cH = 1.0, gap = 1.15;
      // Stack cards vertically, centered around y = 1.5
      const startY = 1.5 + ((count - 1) * gap) / 2;

      // Header label above the stack
      const hdr = document.createElement('a-text');
      hdr.classList.add('t-header');
      hdr.setAttribute('value', 'KAU ESPORTS — TOURNAMENTS');
      hdr.setAttribute('position', `0 ${startY + cH / 2 + 0.38} 0`);
      hdr.setAttribute('align', 'center');
      hdr.setAttribute('color', '#00E676');
      hdr.setAttribute('width', '5');
      hdr.setAttribute('font', 'exo2bold');
      marker.appendChild(hdr);

      tournaments.forEach((t, i) => {
        const canvas = document.createElement('canvas');
        canvas.width = CW;
        canvas.height = CH;
        drawCard(canvas, t);

        const plane = document.createElement('a-plane');
        plane.classList.add('t-card');
        plane.setAttribute('width',    cW);
        plane.setAttribute('height',   cH);
        plane.setAttribute('position', `0 ${startY - i * gap} 0`);
        plane.setAttribute('color',    '#000000');

        // Apply canvas texture via Three.js once the entity initialises
        plane.addEventListener('loaded', () => {
          const mesh = plane.getObject3D('mesh');
          if (!mesh || !mesh.material) return;
          const tex = new AFRAME.THREE.CanvasTexture(canvas);
          mesh.material.map = tex;
          mesh.material.color.setHex(0xffffff);
          mesh.material.needsUpdate = true;
        }, { once: true });

        marker.appendChild(plane);
      });
    }

    // ── Firebase fetch ────────────────────────────────────────────────────────
    async function loadTournaments() {
      try {
        const snap = await getDocs(collection(db, 'tournaments'));
        const rows = [];
        snap.forEach(doc => rows.push({ id: doc.id, ...doc.data() }));

        const order = { ongoing: 0, active: 0, upcoming: 1, completed: 2, cancelled: 3 };
        rows.sort((a, b) =>
          (order[(a.status || 'upcoming').toLowerCase()] ?? 9) -
          (order[(b.status || 'upcoming').toLowerCase()] ?? 9));

        buildCards(rows);
      } catch (e) {
        console.error('Firebase error:', e);
      }
    }

    // ── Navigation ────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      const menu  = document.getElementById('menu-screen');
      const noLb  = document.getElementById('no-lb-screen');
      const hint  = document.getElementById('ar-hint');
      const scene = document.querySelector('a-scene');

      document.getElementById('btn-tournaments').addEventListener('click', () => {
        menu.style.display = 'none';
        hint.classList.add('visible');
        if (scene.hasLoaded) {
          loadTournaments();
        } else {
          scene.addEventListener('loaded', loadTournaments, { once: true });
        }
      });

      document.getElementById('btn-leaderboard').addEventListener('click', () => {
        menu.style.display = 'none';
        noLb.style.display = 'flex';
      });

      document.getElementById('back-btn').addEventListener('click', () => {
        noLb.style.display = 'none';
        menu.style.display = 'flex';
      });

      // Hide hint when marker is detected (no sticky lock — stays interactive)
      const marker = document.querySelector('a-marker');
      marker.addEventListener('markerFound', () => {
        hint.classList.remove('visible');
        hint.classList.add('hidden');
      });
    });
  </script>
</head>

<body style="margin:0;overflow:hidden;">

  <!-- ── Menu screen ─────────────────────────────────────────────────── -->
  <div id="menu-screen">
    <p class="menu-title">Welcome to <span>KAU Esports</span></p>
    <p class="menu-subtitle">Select an option to continue</p>
    <div class="menu-cards">
      <div class="menu-card" id="btn-tournaments">
        <div class="icon">🏆</div>
        <div class="label">Tournaments</div>
      </div>
      <div class="menu-card" id="btn-leaderboard">
        <div class="icon">📊</div>
        <div class="label">Leaderboard</div>
      </div>
    </div>
  </div>

  <!-- ── No leaderboard screen ──────────────────────────────────────── -->
  <div id="no-lb-screen">
    <div class="big-icon">📊</div>
    <div class="msg">No <span>leaderboards</span> available yet.<br>Check back soon!</div>
    <button id="back-btn">← Back</button>
  </div>

  <!-- ── AR hint (shown when AR is active) ──────────────────────────── -->
  <div id="ar-hint">Point camera at the Hiro marker</div>

  <!-- ── AR scene (camera permission requested on page load) ────────── -->
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
  >
    <a-marker preset="hiro" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="2">
      <!-- Tournament cards injected by JavaScript -->
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
